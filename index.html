<!doctype html>
<html lang="tr">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>SpotVibe | Kırklareli</title>

        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />

        <style>
            :root {
                --accent: #00ffa3;
                --bg: #0d0d0d;
                --glass: rgba(20, 20, 20, 0.9);
            }
            body {
                margin: 0;
                background: var(--bg);
                color: white;
                font-family: "Inter", sans-serif;
                overflow: hidden;
            }
            #map {
                position: absolute;
                top: 0;
                bottom: 0;
                width: 100%;
                z-index: 1;
            }

            /* Üst Logo */
            .header-brand {
                position: absolute;
                top: 15px;
                left: 15px;
                z-index: 1000;
                background: var(--glass);
                backdrop-filter: blur(10px);
                padding: 8px 18px;
                border-radius: 50px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                font-weight: 900;
                letter-spacing: -0.5px;
            }

            /* Alt Yatay Liste */
            .bottom-scroll-list {
                position: absolute;
                bottom: 30px;
                left: 0;
                right: 0;
                z-index: 1000;
                display: flex;
                overflow-x: auto;
                padding: 0 20px;
                gap: 15px;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
            }
            .bottom-scroll-list::-webkit-scrollbar {
                display: none;
            }

            .spot-card-mini {
                flex: 0 0 280px;
                scroll-snap-align: center;
                background: var(--glass);
                backdrop-filter: blur(20px);
                border-radius: 24px;
                padding: 18px;
                border: 1px solid rgba(255, 255, 255, 0.15);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            }

            /* Bottom Sheet (Detaylar) */
            .bottom-sheet {
                position: fixed;
                bottom: -100%;
                left: 0;
                right: 0;
                z-index: 2000;
                background: #111;
                border-radius: 30px 30px 0 0;
                height: 75vh;
                transition: bottom 0.5s cubic-bezier(0.22, 1, 0.36, 1);
                padding: 25px;
                box-shadow: 0 -15px 50px rgba(0, 0, 0, 0.9);
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }
            .bottom-sheet.open {
                bottom: 0;
            }

            .sheet-handle {
                width: 50px;
                height: 6px;
                background: rgba(255, 255, 255, 0.15);
                border-radius: 10px;
                margin: -10px auto 20px;
            }
            .sheet-img {
                width: 100%;
                height: 200px;
                border-radius: 20px;
                object-fit: cover;
                margin-bottom: 20px;
                background: #222;
            }

            .analysis-tag {
                display: inline-block;
                background: rgba(0, 255, 163, 0.08);
                color: var(--accent);
                font-size: 11px;
                padding: 6px 14px;
                border-radius: 50px;
                margin: 0 6px 8px 0;
                border: 1px solid rgba(0, 255, 163, 0.15);
            }

            .close-btn {
                position: absolute;
                top: 20px;
                right: 20px;
                font-size: 28px;
                color: #444;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <div class="header-brand">
            <span style="color: var(--accent)">📍 SPOTVIBE</span>
        </div>
        <div class="bottom-scroll-list" id="spot-list"></div>

        <div class="bottom-sheet" id="details-sheet">
            <div class="sheet-handle" onclick="closeDetails()"></div>
            <div class="close-btn" onclick="closeDetails()">&times;</div>

            <div id="sheet-content">
                <div id="sheet-img-container"></div>
                <h2 id="sheet-title" style="margin: 0; font-size: 24px">
                    Mekan
                </h2>
                <p
                    id="sheet-type"
                    style="
                        font-size: 12px;
                        color: var(--accent);
                        margin-top: 5px;
                        font-weight: bold;
                    "
                ></p>
                <p
                    id="sheet-desc"
                    style="
                        font-size: 14px;
                        line-height: 1.6;
                        opacity: 0.7;
                        margin-top: 15px;
                    "
                ></p>

                <div style="margin-top: 20px">
                    <p
                        style="
                            font-size: 11px;
                            font-weight: 800;
                            letter-spacing: 1px;
                            color: #555;
                            margin-bottom: 12px;
                        "
                    >
                        AI YORUM ANALİZİ
                    </p>
                    <div id="sheet-tags"></div>
                </div>

                <button
                    onclick="openInMaps()"
                    style="
                        width: 100%;
                        background: var(--accent);
                        color: black;
                        border: none;
                        padding: 18px;
                        border-radius: 18px;
                        font-weight: 900;
                        margin-top: 25px;
                        font-size: 14px;
                        cursor: pointer;
                    "
                >
                    🗺️ YOL TARİFİ AL
                </button>
            </div>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="data.js"></script>

        <script>
            const map = L.map("map", {
                zoomControl: false,
                attributionControl: false,
            }).setView([41.7314, 27.2154], 15);
            L.tileLayer(
                "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
            ).addTo(map);

            let activeCoords = [41.7314, 27.2154];

            function renderSpots() {
                const list = document.getElementById("spot-list");
                list.innerHTML = "";
                if (typeof mySpots !== "undefined") {
                    mySpots.forEach((spot) => {
                        const [name, lat, lng, type, desc, price, img, tags] =
                            spot;

                        const marker = L.marker([lat, lng]).addTo(map);
                        marker.on("click", () => {
                            map.flyTo([lat, lng], 17);
                            openDetails(spot);
                        });

                        const card = document.createElement("div");
                        card.className = "spot-card-mini";
                        card.innerHTML = `
                        <div style="font-size:10px; color:var(--accent); font-weight:bold; letter-spacing:1px;">${type.toUpperCase()}</div>
                        <div style="font-weight:bold; margin-top:8px; font-size:16px;">${name}</div>
                        <div style="font-size:11px; opacity:0.5; margin-top:5px;">${price} • Detaylar için dokun</div>
                    `;
                        card.onclick = () => {
                            map.flyTo([lat, lng], 17);
                            openDetails(spot);
                        };
                        list.appendChild(card);
                    });
                }
            }

            function openDetails(spot) {
                const [name, lat, lng, type, desc, price, img, tags] = spot;
                activeCoords = [lat, lng];
                document.getElementById("sheet-title").innerText = name;
                document.getElementById("sheet-type").innerText =
                    type + " • " + price;
                document.getElementById("sheet-desc").innerText = desc;

                // Fotoğraf İşlemi: Fotoğraf yoksa AI Yer Tutucu oluşturur
                const imgContainer = document.getElementById(
                    "sheet-img-container",
                );
                const placeholderUrl = `https://ui-avatars.com/api/?name=${name.replace(/ /g, "+")}&background=0d0d0d&color=00ffa3&size=400&font-size=0.2&bold=true`;
                imgContainer.innerHTML = `<img src="${img || placeholderUrl}" class="sheet-img">`;

                const tagsDiv = document.getElementById("sheet-tags");
                tagsDiv.innerHTML = "";
                if (tags)
                    tags.forEach(
                        (t) =>
                            (tagsDiv.innerHTML += `<span class="analysis-tag">${t}</span>`),
                    );

                document.getElementById("details-sheet").classList.add("open");
            }

            function closeDetails() {
                document
                    .getElementById("details-sheet")
                    .classList.remove("open");
            }

            function openInMaps() {
                window.open(
                    `https://www.google.com/maps/dir/?api=1&destination=${activeCoords[0]},${activeCoords[1]}`,
                    "_blank",
                );
            }

            // GPS Takibi
            map.locate({ watch: true, enableHighAccuracy: true });
            map.on("locationfound", (e) => {
                if (window.userMarker) map.removeLayer(window.userMarker);
                window.userMarker = L.circleMarker(e.latlng, {
                    radius: 8,
                    fillColor: "#007bff",
                    color: "#fff",
                    weight: 3,
                    fillOpacity: 1,
                }).addTo(map);
            });

            window.onload = renderSpots;
        </script>
    </body>
</html>
