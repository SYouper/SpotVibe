<!doctype html>
<html lang="tr">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>SpotVibe | Premium Guide</title>
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />
        <style>
            @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap");

            :root {
                --accent: #d4af37; /* Gold / Sand Tonu */
                --bg: #08090a;
                --card-bg: #121418;
                --glass: rgba(18, 20, 24, 0.8);
            }

            body {
                margin: 0;
                background: var(--bg);
                color: #fff;
                font-family: "Plus Jakarta Sans", sans-serif;
                overflow: hidden;
            }

            #map {
                position: absolute;
                top: 0;
                bottom: 0;
                width: 100%;
                z-index: 1;
            }

            /* Minimalist Üst Başlık */
            .header-brand {
                position: absolute;
                top: 30px;
                left: 20px;
                z-index: 1000;
                background: var(--glass);
                backdrop-filter: blur(25px);
                padding: 12px 24px;
                border-radius: 16px;
                border: 1px solid rgba(255, 255, 255, 0.05);
                font-size: 11px;
                letter-spacing: 3px;
                font-weight: 800;
                text-transform: uppercase;
                box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            }

            /* Alt Yatay Liste (Apple Style) */
            .bottom-scroll-list {
                position: absolute;
                bottom: 40px;
                left: 0;
                right: 0;
                z-index: 1000;
                display: flex;
                overflow-x: auto;
                padding: 0 20px;
                gap: 18px;
                scroll-snap-type: x mandatory;
                -webkit-overflow-scrolling: touch;
            }
            .bottom-scroll-list::-webkit-scrollbar {
                display: none;
            }

            .spot-card-mini {
                flex: 0 0 260px;
                scroll-snap-align: center;
                background: var(--card-bg);
                border-radius: 28px;
                padding: 20px;
                border: 1px solid rgba(255, 255, 255, 0.03);
                box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
                transition: transform 0.3s ease;
            }
            .spot-card-mini:active {
                transform: scale(0.96);
            }

            /* Bottom Sheet (Elite) */
            .bottom-sheet {
                position: fixed;
                bottom: -100%;
                left: 0;
                right: 0;
                z-index: 2000;
                background: #0d0f12;
                border-radius: 45px 45px 0 0;
                height: 80vh;
                transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1);
                padding: 30px;
                border-top: 1px solid rgba(255, 255, 255, 0.06);
            }
            .bottom-sheet.open {
                bottom: 0;
            }
            .sheet-handle {
                width: 40px;
                height: 4px;
                background: rgba(255, 255, 255, 0.1);
                border-radius: 10px;
                margin: -10px auto 25px;
            }

            /* Kaydırmalı Slider (Gelişmiş) */
            .image-slider {
                display: flex;
                overflow-x: auto;
                scroll-snap-type: x mandatory;
                gap: 12px;
                margin-bottom: 25px;
                border-radius: 24px;
                -webkit-overflow-scrolling: touch;
            }
            .image-slider::-webkit-scrollbar {
                display: none;
            }
            .slider-img {
                flex: 0 0 90%;
                height: 260px;
                object-fit: cover;
                border-radius: 24px;
                scroll-snap-align: center;
                background: #1a1c20;
            }

            /* Etiketler */
            .analysis-tag {
                display: inline-block;
                background: rgba(212, 175, 55, 0.05);
                color: var(--accent);
                font-size: 10px;
                padding: 8px 16px;
                border-radius: 50px;
                margin: 0 8px 10px 0;
                border: 1px solid rgba(212, 175, 55, 0.15);
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.5px;
            }

            .cta-button {
                width: 100%;
                background: var(--accent);
                color: #000;
                border: none;
                padding: 20px;
                border-radius: 20px;
                font-weight: 800;
                font-size: 13px;
                letter-spacing: 1px;
                margin-top: 30px;
                text-transform: uppercase;
                box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
            }

            .close-btn {
                position: absolute;
                top: 25px;
                right: 30px;
                font-size: 24px;
                color: #444;
            }

            /* Marker Customization */
            .leaflet-marker-icon {
                filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.4));
            }
        </style>
    </head>
    <body>
        <div id="map"></div>
        <div class="header-brand">
            KIRKLARELİ
            <span style="color: var(--accent); margin-left: 5px"
                >• SPOTVIBE</span
            >
        </div>

        <div class="bottom-scroll-list" id="spot-list"></div>

        <div class="bottom-sheet" id="details-sheet">
            <div class="sheet-handle" onclick="closeDetails()"></div>
            <div class="close-btn" onclick="closeDetails()">✕</div>

            <div id="sheet-content">
                <div id="slider-container" class="image-slider"></div>
                <h2
                    id="sheet-title"
                    style="
                        margin: 0;
                        font-size: 26px;
                        font-weight: 800;
                        letter-spacing: -1px;
                    "
                >
                    Mekan
                </h2>
                <p
                    id="sheet-type"
                    style="
                        font-size: 12px;
                        color: var(--accent);
                        margin-top: 8px;
                        font-weight: 600;
                        letter-spacing: 1px;
                    "
                ></p>
                <p
                    id="sheet-desc"
                    style="
                        font-size: 15px;
                        line-height: 1.7;
                        opacity: 0.6;
                        margin-top: 20px;
                        font-weight: 300;
                    "
                ></p>

                <div style="margin-top: 30px">
                    <p
                        style="
                            font-size: 9px;
                            font-weight: 800;
                            letter-spacing: 2px;
                            color: #444;
                            margin-bottom: 15px;
                            text-transform: uppercase;
                        "
                    >
                        Mekan Analizi
                    </p>
                    <div id="sheet-tags"></div>
                </div>

                <button class="cta-button" onclick="openInMaps()">
                    📍 Yol Tarifi Al
                </button>
            </div>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="data.js"></script>
        <script>
            // Haritayı Ultra Dark & Minimalist yapıyoruz
            const map = L.map("map", {
                zoomControl: false,
                attributionControl: false,
            }).setView([41.7314, 27.2154], 15);
            L.tileLayer(
                "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
            ).addTo(map);

            let activeCoords = [41.7314, 27.2154];

            function renderSpots() {
                const list = document.getElementById("spot-list");
                list.innerHTML = "";
                if (typeof mySpots !== "undefined") {
                    mySpots.forEach((spot) => {
                        const [name, lat, lng, type, desc, price, imgs, tags] =
                            spot;
                        const marker = L.marker([lat, lng]).addTo(map);
                        marker.on("click", () => {
                            map.flyTo([lat, lng], 17);
                            openDetails(spot);
                        });

                        const card = document.createElement("div");
                        card.className = "spot-card-mini";
                        card.innerHTML = `
                        <div style="font-size:9px; color:var(--accent); font-weight:800; letter-spacing:1px;">${type.toUpperCase()}</div>
                        <div style="font-weight:700; margin-top:10px; font-size:18px; letter-spacing:-0.5px;">${name}</div>
                        <div style="font-size:12px; opacity:0.4; margin-top:6px; font-weight:400;">${price} • Keşfet</div>
                    `;
                        card.onclick = () => {
                            map.flyTo([lat, lng], 17);
                            openDetails(spot);
                        };
                        list.appendChild(card);
                    });
                }
            }

            function openDetails(spot) {
                const [name, lat, lng, type, desc, price, imgs, tags] = spot;
                activeCoords = [lat, lng];
                document.getElementById("sheet-title").innerText = name;
                document.getElementById("sheet-type").innerText =
                    type + " • " + price;
                document.getElementById("sheet-desc").innerText = desc;

                const slider = document.getElementById("slider-container");
                slider.innerHTML = "";

                if (Array.isArray(imgs) && imgs.length > 0) {
                    imgs.forEach((img) => {
                        slider.innerHTML += `<img src="./${img}" class="slider-img" onerror="this.src='https://ui-avatars.com/api/?name=${name.replace(/ /g, "+")}&background=121418&color=d4af37&size=400'">`;
                    });
                } else {
                    slider.innerHTML = `<img src="https://ui-avatars.com/api/?name=${name.replace(/ /g, "+")}&background=121418&color=d4af37&size=400" class="slider-img">`;
                }

                const tagsDiv = document.getElementById("sheet-tags");
                tagsDiv.innerHTML = "";
                if (tags)
                    tags.forEach(
                        (t) =>
                            (tagsDiv.innerHTML += `<span class="analysis-tag">${t}</span>`),
                    );
                document.getElementById("details-sheet").classList.add("open");
            }

            function closeDetails() {
                document
                    .getElementById("details-sheet")
                    .classList.remove("open");
            }
            function openInMaps() {
                window.open(
                    `https://www.google.com/maps/dir/?api=1&destination=${activeCoords[0]},${activeCoords[1]}`,
                    "_blank",
                );
            }

            map.locate({ watch: true, enableHighAccuracy: true });
            map.on("locationfound", (e) => {
                if (window.userMarker) map.removeLayer(window.userMarker);
                window.userMarker = L.circleMarker(e.latlng, {
                    radius: 6,
                    fillColor: "#fff",
                    color: "#d4af37",
                    weight: 4,
                    fillOpacity: 1,
                }).addTo(map);
            });

            window.onload = renderSpots;
        </script>
    </body>
</html>
